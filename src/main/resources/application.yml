spring:
  application:
    name: money-manager

  profiles:
    active: dev

  thymeleaf:
    cache: false

---
# ---------------------------------------------------------------
# DEV PROFILE: uses file-based H2 so data survives app restarts.
# The database file is created at ./data/moneymanager.mv.db inside
# the project folder — do not delete that file unless you want a
# fresh start. Console at /h2-console (dev only).
# ---------------------------------------------------------------
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:file:./data/moneymanager;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---
# ---------------------------------------------------------------
# PROD PROFILE: PostgreSQL. Set these as environment variables:
#   DB_URL, DB_USERNAME, DB_PASSWORD
# Run with: --spring.profiles.active=prod
# ---------------------------------------------------------------
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/moneymanager}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # 'update' so the schema is auto-created on first deploy (no Flyway/
      # Liquibase set up yet). Switch to 'validate' once you've deployed once
      # successfully and trust the schema is stable.
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  # Railway/Render assign a random port via the PORT env var — the app must
  # listen on that, not a hardcoded one.
  port: ${PORT:8080}
