<form th:action="@{/transactions/add}" th:object="${transaction}" method="post">
    
    <label>Transaction Type:</label>
    <select th:field="*{type}" required>
        <option value="INCOME">Income (Deposit)</option>
        <option value="EXPENSE">Expense (Withdraw)</option>
    </select>

    <!-- Account ka ID -->
    <label>Select Account:</label>
    <select name="accountId" required>
        <option th:each="acc : ${accounts}" th:value="${acc.id}" th:text="${acc.name}"></option>
    </select>

    <!-- Category ka ID -->
    <label>Category:</label>
    <select name="categoryId" required>
        <option value="">-- Select Category --</option>
        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
    </select>

    <label>Amount:</label>
    <input type="number" step="0.01" th:field="*{amount}" required placeholder="0.00" />

    <label>Payment Method:</label>
    <select th:field="*{paymentMethod}" required>
        <option value="CASH">Cash</option>
        <option value="CREDIT_CARD">Credit Card</option>
        <option value="DEBIT_CARD">Debit Card</option>
        <option value="UPI">UPI / Transfer</option>
    </select>

    <label>Comments / Notes:</label>
    <textarea th:field="*{notes}" rows="3" placeholder="What was this for?"></textarea>

    <button type="submit">Save Transaction</button>
    <a th:href="@{/accounts}" style="display:block; text-align:center; margin-top:10px; color:#555; text-decoration:none;">Cancel</a>
</form>
