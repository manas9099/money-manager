<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Accounts — Ledger</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { padding: 10px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .btn-add { background: #28a745; color: white; margin-right: 10px; }
        .btn-back { background: #eee; color: #333; }
    </style>
</head>
<body>
<div class="app-shell">
    <main class="main">
        <div class="page-head">
            <div>
                <span class="eyebrow">Manage your money</span>
                <h1>Your Accounts</h1>
            </div>
            <div>
                <!-- Add Transaction Button -->
                <a th:href="@{/transactions/add}" class="btn btn-add">Add Transaction</a>
                <!-- Back to Dashboard -->
                <a th:href="@{/dashboard}" class="btn btn-back">Back to Dashboard</a>
            </div>
        </div>
        
        <div class="grid">
            <div class="card" th:each="account : ${accounts}">
                <div class="label" th:text="${account.name}">Account Name</div>
                <div class="value mono" th:text="${account.currentBalance}">0.00</div>
            </div>
            <div class="empty-state" th:if="${accounts == null or accounts.isEmpty()}">
                No accounts found. Create one to get started!
            </div>
        </div>
    </main>
</div>
</body>
</html>
