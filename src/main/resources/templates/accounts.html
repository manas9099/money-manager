<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Accounts — Ledger</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <main class="main">
        <div class="page-head">
            <div>
                <span class="eyebrow">Manage your money</span>
                <h1>Your Accounts</h1>
            </div>
            <a th:href="@{/dashboard}" style="padding: 10px; background: #eee; text-decoration: none; border-radius: 5px;">Back to Dashboard</a>
        </div>
        
        <div class="grid">
            <div class="card" th:each="account : ${accounts}">
                <div class="label" th:text="${account.name}">Account Name</div>
                <div class="value mono" th:text="${account.currentBalance}">0.00</div>
            </div>
            <div class="empty-state" th:if="${accounts == null or accounts.isEmpty()}">
                No accounts found. Create one to get started!
            </div>
        </div>
    </main>
</div>
</body>
</html>
