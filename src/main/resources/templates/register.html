<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create account — Ledger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-shell">
    <div class="auth-card">
        <span class="eyebrow">Money Manager</span>
        <h1>Open your ledger</h1>
        <p class="sub">Takes under a minute. No card required.</p>

        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/register}" method="post">
            <div class="field">
                <label for="fullName">Full name</label>
                <input type="text" id="fullName" name="fullName" required autofocus>
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" minlength="8" required>
            </div>
            <button type="submit" class="btn btn-primary">Create account</button>
        </form>

        <div class="auth-foot">
            Already have an account? <a th:href="@{/login}">Sign in</a>
        </div>
    </div>
</div>
</body>
</html>
